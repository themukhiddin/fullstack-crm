services:
  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - crm

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - crm

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/node/Dockerfile
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - crm

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - crm

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - crm

volumes:
  pgdata:

networks:
  crm:
    driver: bridge
